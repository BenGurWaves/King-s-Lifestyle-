<!-- onboarding.html -->
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding — A King's Lifestyle</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { royal: { green: '#052B20', cream: '#FFF6E6', gold: '#A38255', plum: '#571641', sapphire: '#08052D' } },
          fontFamily: { cinzel: ['Cinzel','serif'], inter: ['Inter','sans-serif'], playfair: ['Playfair Display','serif'] },
          animation: { fadeIn: 'fadeIn 0.8s ease-out forwards', fadeInUp: 'fadeInUp 0.8s ease-out forwards' },
          keyframes: { fadeIn: { '0%':{opacity:'0'},'100%':{opacity:'1'} }, fadeInUp: { '0%':{opacity:'0',transform:'translateY(24px)'},'100%':{opacity:'1',transform:'translateY(0)'} } }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
  <style>
    .bg-parchment { background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); }
    .gold-glow:hover { box-shadow: 0 0 30px rgba(163,130,85,0.25); }
    .dark .bg-parchment { background-color: #0a0a0a; }
    .dark body { background-color: #0a0a0a; color: #e0d5c4; }
  </style>
</head>
<body class="bg-royal-cream bg-parchment font-inter text-royal-sapphire min-h-screen">
  <div id="mainNav"></div>

  <section class="max-w-3xl mx-auto px-6 py-16">
    <div class="text-center mb-16 animate-fadeInUp">
      <h1 class="font-cinzel text-3xl md:text-4xl text-royal-plum mb-4">The King's Inquiry</h1>
      <p class="font-playfair italic text-royal-gold text-lg">"Before a king builds his kingdom, he must first know himself."</p>
      <p class="text-sm text-royal-sapphire/50 mt-4">Answer these ten questions. Speak or type — the choice is yours.</p>
    </div>

    <!-- Progress Bar -->
    <div class="mb-12">
      <div class="flex justify-between text-xs font-cinzel text-royal-gold/60 mb-2">
        <span>Question <span id="currentQ">1</span> of 10</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="h-1 bg-royal-gold/10 rounded-full overflow-hidden">
        <div id="progressBar" class="h-full bg-royal-gold rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>
    </div>

    <!-- Question Container -->
    <div id="questionContainer" class="animate-fadeIn">
      <!-- Filled by JS -->
    </div>

    <!-- Completion -->
    <div id="completionScreen" class="hidden text-center py-16 animate-fadeInUp">
      <div class="text-5xl mb-6">👑</div>
      <h2 class="font-cinzel text-2xl text-royal-plum mb-4">The Inquiry Is Complete</h2>
      <p class="font-playfair italic text-royal-gold mb-8">"Now the journey truly begins."</p>
      <a href="index.html" class="inline-block px-8 py-3 bg-royal-gold text-white font-cinzel tracking-wider rounded-lg hover:bg-royal-plum transition-all duration-500">
        Enter the Kingdom
      </a>
    </div>
  </section>

  <div id="mainFooter"></div>
  <script src="shared.js"></script>
  <script>
    const QUESTIONS = [
      { id: 'struggle', q: "What is your biggest struggle right now?", hint: "Be honest. A king faces his battles head-on.", type: 'text' },
      { id: 'age', q: "What is your age and current life stage?", hint: "Student, early career, married, father, retired, etc.", type: 'text' },
      { id: 'goals', q: "What are your top 3 goals for the next 90 days?", hint: "Be specific. Vague goals produce vague results.", type: 'textarea' },
      { id: 'routine', q: "Describe your daily routine.", hint: "From waking to sleeping. You may use the voice recorder.", type: 'voice' },
      { id: 'family', q: "Tell us about your family background.", hint: "What shaped the man you are today?", type: 'textarea' },
      { id: 'scenarios', q: "Any specific scenarios you want to master?", hint: "Pool parties, boardroom presence, first dates, jeans-on-a-hill moments...", type: 'textarea' },
      { id: 'depth', q: "What depth of content do you prefer?", hint: "Choose what suits your learning pace.", type: 'select', options: ['Quick & actionable', 'Moderate detail', 'Deep & comprehensive'] },
      { id: 'dietary', q: "Do you have any dietary limits or preferences?", hint: "Allergies, religious restrictions, preferences.", type: 'text' },
      { id: 'financial', q: "What is your current financial level?", hint: "This helps us tailor Treasury content.", type: 'select', options: ['Building from scratch', 'Stable income', 'Growing wealth', 'Established'] },
      { id: 'learning', q: "What is your preferred learning style?", hint: "How do you absorb wisdom best?", type: 'select', options: ['Reading & reflection', 'Video & visual', 'Audio & conversation', 'Hands-on practice'] }
    ];

    let currentIndex = 0;
    const answers = JSON.parse(localStorage.getItem('kl_onboarding') || '{}');

    function renderQuestion() {
      const q = QUESTIONS[currentIndex];
      const saved = answers[q.id] || '';
      let inputHTML = '';

      if (q.type === 'text') {
        inputHTML = `<input type="text" id="answerInput" value="${saved}" placeholder="Type your answer..." class="w-full px-5 py-4 rounded-xl border border-royal-gold/20 bg-white/50 dark:bg-white/5 font-inter focus:outline-none focus:border-royal-gold transition text-sm">`;
      } else if (q.type === 'textarea' || q.type === 'voice') {
        inputHTML = `<textarea id="answerInput" rows="4" placeholder="Type your answer..." class="w-full px-5 py-4 rounded-xl border border-royal-gold/20 bg-white/50 dark:bg-white/5 font-inter focus:outline-none focus:border-royal-gold transition text-sm resize-none">${saved}</textarea>`;
      } else if (q.type === 'select') {
        inputHTML = `<div class="flex flex-col gap-3">${q.options.map(o => `
          <label class="flex items-center gap-3 px-5 py-3 rounded-xl border border-royal-gold/20 bg-white/50 dark:bg-white/5 cursor-pointer hover:border-royal-gold/40 transition">
            <input type="radio" name="answer" value="${o}" ${saved === o ? 'checked' : ''} class="accent-royal-gold">
            <span class="font-inter text-sm">${o}</span>
          </label>
        `).join('')}</div>`;
      }

      const voiceBtn = (q.type === 'voice' || q.type === 'text' || q.type === 'textarea') ?
        `<button onclick="startVoice()" id="voiceBtn" class="mt-4 flex items-center gap-2 px-4 py-2 rounded-lg border border-royal-gold/20 text-royal-gold text-sm hover:bg-royal-gold/10 transition">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="5" r="3"/><path d="M3 9a5 5 0 0010 0"/><line x1="8" y1="12" x2="8" y2="16"/></svg>
          Speak Your Answer
        </button>` : '';

      document.getElementById('questionContainer').innerHTML = `
        <div class="bg-white dark:bg-royal-sapphire/20 border border-royal-gold/10 rounded-2xl p-8 md:p-12 animate-fadeIn">
          <h2 class="font-cinzel text-xl text-royal-plum dark:text-royal-gold mb-2">${q.q}</h2>
          <p class="text-sm text-royal-sapphire/40 dark:text-white/30 mb-8 font-playfair italic">${q.hint}</p>
          ${inputHTML}
          ${voiceBtn}
          <div class="flex justify-between mt-8">
            <button onclick="prevQuestion()" class="px-6 py-2 rounded-lg border border-royal-gold/20 text-royal-gold text-sm hover:bg-royal-gold/10 transition ${currentIndex === 0 ? 'invisible' : ''}">Previous</button>
            <button onclick="nextQuestion()" class="px-6 py-2 rounded-lg bg-royal-gold text-white text-sm font-cinzel hover:bg-royal-plum transition">${currentIndex === 9 ? 'Complete' : 'Continue'}</button>
          </div>
        </div>
      `;
      updateProgress();
    }

    function getAnswer() {
      const q = QUESTIONS[currentIndex];
      if (q.type === 'select') {
        const checked = document.querySelector('input[name="answer"]:checked');
        return checked ? checked.value : '';
      }
      return document.getElementById('answerInput')?.value || '';
    }

    function saveAnswer() {
      const q = QUESTIONS[currentIndex];
      answers[q.id] = getAnswer();
      localStorage.setItem('kl_onboarding', JSON.stringify(answers));
    }

    function nextQuestion() {
      saveAnswer();
      if (currentIndex < 9) {
        currentIndex++;
        renderQuestion();
      } else {
        document.getElementById('questionContainer').classList.add('hidden');
        document.getElementById('completionScreen').classList.remove('hidden');
        localStorage.setItem('kl_onboardingComplete', 'true');
      }
    }

    function prevQuestion() {
      saveAnswer();
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function updateProgress() {
      const pct = Math.round((currentIndex / 10) * 100);
      document.getElementById('currentQ').textContent = currentIndex + 1;
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressBar').style.width = pct + '%';
    }

    // Web Speech API voice input
    let recognition = null;
    function startVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice input is not supported in this browser. Please type your answer.');
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      const btn = document.getElementById('voiceBtn');
      btn.classList.add('bg-red-500/20', 'border-red-400');
      btn.innerHTML = '<span class="animate-pulse">● Recording...</span> Tap to stop';
      btn.onclick = stopVoice;

      recognition.onresult = (e) => {
        let transcript = '';
        for (let i = 0; i < e.results.length; i++) {
          transcript += e.results[i][0].transcript;
        }
        const input = document.getElementById('answerInput');
        if (input) input.value = transcript;
      };
      recognition.start();
    }

    function stopVoice() {
      if (recognition) recognition.stop();
      const btn = document.getElementById('voiceBtn');
      btn.classList.remove('bg-red-500/20', 'border-red-400');
      btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="5" r="3"/><path d="M3 9a5 5 0 0010 0"/><line x1="8" y1="12" x2="8" y2="16"/></svg> Speak Your Answer`;
      btn.onclick = startVoice;
    }

    renderQuestion();
  </script>
</body>
</html>
