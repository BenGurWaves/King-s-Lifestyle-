<!-- settings.html – v0.0.3 -->
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — A King's Lifestyle</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{royal:{green:'#052B20',cream:'#FFF6E6',gold:'#A38255',plum:'#571641',sapphire:'#08052D'}},fontFamily:{cinzel:['Cinzel','serif'],inter:['Inter','sans-serif'],playfair:['Playfair Display','serif']},animation:{fadeIn:'fadeIn 0.8s ease-out forwards',fadeInUp:'fadeInUp 0.8s ease-out forwards'},keyframes:{fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},fadeInUp:{'0%':{opacity:'0',transform:'translateY(24px)'},'100%':{opacity:'1',transform:'translateY(0)'}}}}}};</script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
  <style>.bg-parchment{background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");}.gold-glow:hover{box-shadow:0 0 30px rgba(163,130,85,0.25);}.dark .bg-parchment{background-color:#0a0a0a;}.dark body{background-color:#0a0a0a;color:#e0d5c4;}.toggle-track{width:52px;height:28px;border-radius:14px;position:relative;cursor:pointer;transition:background-color 0.3s ease;}.toggle-track.off{background-color:rgba(163,130,85,0.15);}.toggle-track.on{background-color:#A38255;}.toggle-knob{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left 0.3s ease;box-shadow:0 1px 4px rgba(0,0,0,0.15);}.toggle-track.off .toggle-knob{left:3px;}.toggle-track.on .toggle-knob{left:27px;}</style>
</head>
<body class="bg-royal-cream bg-parchment font-inter text-royal-sapphire min-h-screen">
  <div id="mainNav"></div>

  <section class="max-w-2xl mx-auto px-6 pt-20 pb-16 animate-fadeInUp">
    <!-- Header -->
    <div class="text-center mb-16">
      <h1 class="font-cinzel text-3xl md:text-4xl text-royal-plum dark:text-royal-gold mb-4">Royal Settings</h1>
      <p class="font-inter text-sm text-royal-sapphire/50 dark:text-white/40">Configure your kingdom to suit your preferences.</p>
    </div>

    <div class="space-y-6">

      <!-- 1. Account Info -->
      <div class="bg-white dark:bg-royal-sapphire/20 border border-royal-gold/10 rounded-2xl p-6 md:p-8">
        <h2 class="font-cinzel text-lg text-royal-plum dark:text-royal-gold mb-6">Account</h2>
        <div class="space-y-4 text-sm">
          <div class="flex justify-between items-center py-2 border-b border-royal-gold/5 dark:border-white/5">
            <span class="text-royal-sapphire/60 dark:text-white/40">Email</span>
            <span id="settingEmail" class="font-mono text-royal-gold text-xs"></span>
          </div>
          <div class="flex justify-between items-center py-2">
            <span class="text-royal-sapphire/60 dark:text-white/40">User ID</span>
            <span id="settingUserId" class="font-mono text-royal-sapphire/30 dark:text-white/20 text-xs"></span>
          </div>
        </div>
      </div>

      <!-- 2. Appearance: Dark/Light -->
      <div class="bg-white dark:bg-royal-sapphire/20 border border-royal-gold/10 rounded-2xl p-6 md:p-8">
        <h2 class="font-cinzel text-lg text-royal-plum dark:text-royal-gold mb-6">Appearance</h2>
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm font-medium dark:text-white/80">Dark Mode</p>
            <p class="text-xs text-royal-sapphire/40 dark:text-white/30 mt-1">Switch between light and dark themes</p>
          </div>
          <div id="darkToggle" class="toggle-track off" role="switch" aria-label="Dark mode toggle" tabindex="0">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>

      <!-- 3. Wisdom Mode: Bible/Secular -->
      <div class="bg-white dark:bg-royal-sapphire/20 border border-royal-gold/10 rounded-2xl p-6 md:p-8">
        <h2 class="font-cinzel text-lg text-royal-plum dark:text-royal-gold mb-6">Wisdom Mode</h2>
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm font-medium dark:text-white/80">Biblical Wisdom</p>
            <p class="text-xs text-royal-sapphire/40 dark:text-white/30 mt-1">Toggle between Biblical and secular philosophical guidance</p>
          </div>
          <div id="modeToggle" class="toggle-track off" role="switch" aria-label="Wisdom mode toggle" tabindex="0">
            <div class="toggle-knob"></div>
          </div>
        </div>
        <p id="modeLabel" class="text-xs text-royal-gold mt-4 font-inter"></p>
      </div>

      <!-- 4. Data Management -->
      <div class="bg-white dark:bg-royal-sapphire/20 border border-royal-gold/10 rounded-2xl p-6 md:p-8">
        <h2 class="font-cinzel text-lg text-royal-plum dark:text-royal-gold mb-6">Data Management</h2>
        <div class="space-y-4">
          <button id="exportBtn" class="w-full flex items-center justify-between px-5 py-4 rounded-xl border border-royal-gold/20 text-sm text-royal-gold hover:bg-royal-gold/10 transition-all duration-300">
            <span class="font-inter">Export All Data</span>
            <span class="text-xs opacity-50">JSON</span>
          </button>
          <button id="clearBtn" class="w-full flex items-center justify-between px-5 py-4 rounded-xl border border-red-300/30 dark:border-red-400/20 text-sm text-red-400 hover:bg-red-400/10 transition-all duration-300">
            <span class="font-inter">Clear All Data</span>
            <span class="text-xs opacity-50">Irreversible</span>
          </button>
        </div>
      </div>

      <!-- 5. Sign Out -->
      <div class="bg-white dark:bg-royal-sapphire/20 border border-royal-gold/10 rounded-2xl p-6 md:p-8">
        <button id="signOutBtn" class="w-full py-4 rounded-xl border border-royal-plum/20 dark:border-royal-gold/20 text-royal-plum dark:text-royal-gold font-cinzel tracking-wider text-sm hover:bg-royal-plum hover:text-white dark:hover:bg-royal-gold dark:hover:text-white transition-all duration-500">
          Sign Out
        </button>
      </div>

    </div>

    <!-- 6. Version -->
    <p class="text-center text-xs text-royal-sapphire/20 dark:text-white/15 mt-12 font-inter">v0.0.3</p>
  </section>

  <div id="mainFooter"></div>

  <script src="shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!requireAuth()) return;
      initPrivate();

      // --- Account Info ---
      var email = localStorage.getItem('kl_userEmail') || 'Not set';
      var userId = localStorage.getItem('kl_userId') || 'Unknown';
      document.getElementById('settingEmail').textContent = email;
      document.getElementById('settingUserId').textContent = userId;

      // --- Dark Mode Toggle ---
      var darkToggle = document.getElementById('darkToggle');
      function updateDarkToggle() {
        var isDark = getDark();
        darkToggle.className = 'toggle-track ' + (isDark ? 'on' : 'off');
      }
      updateDarkToggle();

      darkToggle.addEventListener('click', function() {
        setDark(!getDark());
        updateDarkToggle();
      });
      darkToggle.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setDark(!getDark());
          updateDarkToggle();
        }
      });

      // --- Wisdom Mode Toggle ---
      var modeToggle = document.getElementById('modeToggle');
      var modeLabel = document.getElementById('modeLabel');

      function updateModeToggle() {
        var isBible = getMode();
        modeToggle.className = 'toggle-track ' + (isBible ? 'on' : 'off');
        modeLabel.textContent = isBible ? 'Currently: Biblical Wisdom' : 'Currently: Secular Philosophy';
      }
      updateModeToggle();

      modeToggle.addEventListener('click', function() {
        setMode(!getMode());
        updateModeToggle();
      });
      modeToggle.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setMode(!getMode());
          updateModeToggle();
        }
      });

      // --- Export Data ---
      document.getElementById('exportBtn').addEventListener('click', function() {
        var exportData = {};
        for (var i = 0; i < localStorage.length; i++) {
          var key = localStorage.key(i);
          if (key.startsWith('kl_')) {
            exportData[key] = localStorage.getItem(key);
          }
        }
        var blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'kings-lifestyle-data-' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(a.href);
      });

      // --- Clear All Data ---
      document.getElementById('clearBtn').addEventListener('click', function() {
        if (!confirm('This will permanently erase all your progress, journal entries, onboarding answers, and settings.\n\nAre you certain?')) return;
        if (!confirm('Final confirmation — this cannot be undone. Proceed?')) return;
        var keys = [];
        for (var i = 0; i < localStorage.length; i++) {
          var key = localStorage.key(i);
          if (key.startsWith('kl_')) keys.push(key);
        }
        keys.forEach(function(k) { localStorage.removeItem(k); });
        window.location.href = 'index.html';
      });

      // --- Sign Out ---
      document.getElementById('signOutBtn').addEventListener('click', function() {
        signOut();
      });
    });
  </script>
</body>
</html>
